<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المحيط السحابي - ماجد القويعاني</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.88);
            --text-dark: #2c3e50;
            --ocean-blue: #a2d2ff;
            --ocean-pink: #fbc2eb;
            --wave-speed: 20s; 
        }

        body {
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #fff; overflow-x: hidden;
        }

        .ocean { height: 100%; width: 100%; position: fixed; bottom: 0; left: 0; background: linear-gradient(180deg, #ffffff 0%, var(--ocean-pink) 50%, var(--ocean-blue) 100%); z-index: -1; }
        .wave { background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; position: absolute; bottom: -20px; width: 6400px; height: 280px; animation: wave-move var(--wave-speed) linear infinite; opacity: 0.4; }
        @keyframes wave-move { 0% { transform: translateX(0); } 100% { transform: translateX(-1600px); } }

        .glass-container {
            background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 30px;
            padding: 25px; width: 95%; max-width: 500px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 10; margin-bottom: 80px;
        }

        h2 { text-align: center; color: var(--text-dark); margin: 0 0 15px 0; font-weight: 300; }
        .form-grid { display: grid; gap: 10px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); background: rgba(255,255,255,0.8); box-sizing: border-box; outline: none; font-size: 14px; }
        .multi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .btn { background: #fff; border: none; padding: 10px; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .btn i { font-size: 18px; margin-bottom: 4px; }
        .btn span { font-size: 10px; font-weight: bold; }

        /* شاشة عرض السجلات المضافة */
        .records-display {
            margin-top: 25px; padding: 15px; background: rgba(255, 255, 255, 0.5);
            border-radius: 20px; border: 1px dashed var(--ocean-blue);
            display: none; /* تظهر فقط عند وجود بيانات */
        }
        .record-card {
            background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px;
            font-size: 13px; border-right: 4px solid var(--ocean-blue); position: relative;
        }
        .record-card h4 { margin: 0 0 5px 0; color: var(--text-dark); }
        .record-card p { margin: 2px 0; color: #666; font-size: 11px; }
        .print-mini-btn {
            position: absolute; left: 10px; top: 10px;
            background: var(--ocean-blue); color: white; border: none;
            padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 10px;
        }

        .copyright { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(0, 0, 0, 0.05); text-align: center; color: #7f8c8d; }
        .dev-name { display: block; font-weight: 600; color: var(--text-dark); font-size: 13px; }

        @media print {
            .ocean, .toolbar, .form-grid, .control-panel, h2, .print-mini-btn, .copyright { display: none !important; }
            body { background: white; padding: 0; }
            .glass-container { box-shadow: none; border: none; width: 100%; max-width: none; }
            .records-display { display: block !important; border: none; }
            .record-card { border: 1px solid #eee; break-inside: avoid; }
        }

        .control-panel { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.5); padding: 8px 18px; border-radius: 40px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); z-index: 100; }
    </style>
</head>
<body>

    <div class="ocean"><div class="wave"></div><div class="wave"></div></div>

    <div class="glass-container">
        <h2>السجلات السحابية</h2>
        <div class="form-grid">
            <input type="text" id="name" placeholder="الاسم الكامل">
            <div class="multi-row">
                <input type="number" id="age" placeholder="العمر">
                <input type="number" id="height" placeholder="الطول">
                <input type="number" id="weight" placeholder="الوزن">
            </div>
            <input type="text" id="family" placeholder="العائلة">
            <input type="text" id="city" placeholder="المدينة">
            <textarea id="terms" rows="2" placeholder="الشروط والملاحظات"></textarea>
        </div>

        <div class="toolbar">
            <button class="btn" style="color: #2ecc71;" onclick="saveToCloud()"><i class="fas fa-save"></i><span>حفظ</span></button>
            <button class="btn" style="color: #3498db;" onclick="loadFromCloud()"><i class="fas fa-sync"></i><span>مزامنة</span></button>
            <button class="btn" style="color: #e74c3c;" onclick="resetForm()"><i class="fas fa-trash-alt"></i><span>مسح</span></button>
            <button class="btn" style="color: #f1c40f;" onclick="window.print()"><i class="fas fa-print"></i><span>طباعة</span></button>
        </div>

        <div id="recordsDisplay" class="records-display">
            <h5 style="margin: 0 0 10px 0; color: var(--text-dark);"><i class="fas fa-list-ul"></i> السجل الحالي المعاين:</h5>
            <div id="recordContent"></div>
        </div>

        <div class="copyright">
            <span style="font-size: 10px;">التطوير والبرمجة</span>
            <span class="dev-name">ماجد محمد القويعاني</span>
            <span style="font-size: 10px;">maged.qwani@gmail.com</span>
        </div>
    </div>

    <div class="control-panel">
        <i class="fas fa-water" style="color: #3498db;"></i>
        <input type="range" id="speedRange" min="5" max="60" value="20">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCU7ngPz4swM0jRDpmQ8GS9bMgp2Kh1IU",
            authDomain: "oceanproject-a02aa.firebaseapp.com",
            projectId: "oceanproject-a02aa",
            storageBucket: "oceanproject-a02aa.firebasestorage.app",
            messagingSenderId: "108495702627",
            appId: "1:108495702627:web:863e986e0a3eceac620656",
            measurementId: "G-9NLZ7PG1WR"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function displayRecord(data) {
            const displayArea = document.getElementById('recordsDisplay');
            const content = document.getElementById('recordContent');
            displayArea.style.display = 'block';
            content.innerHTML = `
                <div class="record-card">
                    <button class="print-mini-btn" onclick="window.print()">طباعة هذا السجل</button>
                    <h4>${data.name} ${data.family}</h4>
                    <p><b>العمر:</b> ${data.age} | <b>الطول:</b> ${data.height} | <b>الوزن:</b> ${data.weight}</p>
                    <p><b>المدينة:</b> ${data.city}</p>
                    <p><b>ملاحظات:</b> ${data.terms}</p>
                    <p style="font-size:9px; color:#aaa; margin-top:5px;">تاريخ السجل: ${new Date(data.updatedAt).toLocaleString('ar-SA')}</p>
                </div>
            `;
        }

        function saveToCloud() {
            const name = document.getElementById('name').value;
            if(!name) return alert("الاسم مطلوب");

            const userData = {
                name: name,
                age: document.getElementById('age').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                family: document.getElementById('family').value,
                city: document.getElementById('city').value,
                terms: document.getElementById('terms').value,
                updatedAt: new Date().toISOString()
            };

            database.ref('records/' + name.replace(/\s/g, '_')).set(userData)
                .then(() => {
                    alert("تم الحفظ سحابياً");
                    displayRecord(userData);
                })
                .catch(err => alert("خطأ: " + err.message));
        }

        function loadFromCloud() {
            const name = document.getElementById('name').value;
            if(!name) return alert("اكتب الاسم للمزامنة");

            database.ref('records/' + name.replace(/\s/g, '_')).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('age').value = data.age;
                    document.getElementById('height').value = data.height;
                    document.getElementById('weight').value = data.weight;
                    document.getElementById('family').value = data.family;
                    document.getElementById('city').value = data.city;
                    document.getElementById('terms').value = data.terms;
                    displayRecord(data);
                } else {
                    alert("لا يوجد سجل بهذا الاسم");
                }
            });
        }

        function resetForm() {
            document.querySelectorAll('input, textarea').forEach(i=>i.value='');
            document.getElementById('recordsDisplay').style.display = 'none';
        }

        const range = document.getElementById('speedRange');
        range.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--wave-speed', e.target.value + 's');
        });
    </script>
</body>
</html>
