<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المحيط - ماجد القويعاني</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --blue: #a2d2ff; --glass: rgba(255, 255, 255, 0.95); }
        
        /* تحسينات عامة للجوال */
        body { 
            margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; background: #f0f2f5;
        }
        
        .ocean { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(180deg, #fff 0%, var(--blue) 100%); z-index: -1; }
        
        .container { 
            background: var(--glass); backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 15px; width: 100%; 
            max-width: 500px; box-sizing: border-box; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1;
        }

        .form-grid { display: grid; gap: 12px; }
        
        /* تكبير الحقول للمس */
        input, textarea { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid #ddd; font-size: 16px; /* منع الزووم التلقائي في آيفون */
            box-sizing: border-box; background: #fff;
        }
        
        .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        /* تحسين شريط الأدوات للجوال */
        .toolbar { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; margin: 20px 0; 
        }
        
        .btn { 
            background: #fff; border: 1px solid #eee; padding: 12px 5px; 
            border-radius: 15px; cursor: pointer; display: flex; 
            flex-direction: column; align-items: center; 
            transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        
        .btn i { font-size: 18px; margin-bottom: 5px; }
        .btn span { font-size: 10px; font-weight: bold; white-space: nowrap; }

        /* تحسين الجدول للعرض الصغير */
        .table-wrap { 
            max-height: 250px; overflow-y: auto; border-radius: 12px; 
            background: #fff; margin-top: 15px; border: 1px solid #eee;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #f5f5f5; }
        th { background: #f8f9fa; position: sticky; top: 0; color: #333; }

        .status { text-align: center; font-size: 12px; color: #666; margin: 10px 0; font-weight: 600; }

        /* اخفاء بعض العناصر عند الطباعة من الجوال */
        @media print { .toolbar, .ocean { display: none; } }
    </style>
</head>
<body>

    <div class="ocean"></div>

    <div class="container">
        <h3 style="text-align: center; margin: 0 0 15px; color: #2c3e50;">نظام المحيط - جوال</h3>
        
        <div class="form-grid">
            <input id="n" type="text" placeholder="الاسم الكامل">
            <div class="row3">
                <input id="a" type="number" placeholder="العمر">
                <input id="h" type="number" placeholder="الطول">
                <input id="w" type="number" placeholder="الوزن">
            </div>
            <input id="l" type="text" placeholder="العائلة">
            <input id="c" type="text" placeholder="المدينة">
            <textarea id="t" rows="2" placeholder="ملاحظات"></textarea>
        </div>

        <div class="toolbar">
            <button class="btn" onclick="nav(-1)"><i class="fas fa-chevron-right"></i><span>السابق</span></button>
            <button class="btn" style="color: #2ecc71" onclick="save()"><i class="fas fa-save"></i><span>حفظ</span></button>
            <button class="btn" style="color: #9b59b6" onclick="clr()"><i class="fas fa-plus"></i><span>جديد</span></button>
            <button class="btn" onclick="nav(1)"><i class="fas fa-chevron-left"></i><span>التالي</span></button>
            
            <button class="btn" style="color: #e67e22" onclick="clr()"><i class="fas fa-eraser"></i><span>مسح</span></button>
            <button class="btn" style="color: #34495e" onclick="window.print()"><i class="fas fa-print"></i><span>طباعة</span></button>
            <button class="btn" style="color: #e74c3c" onclick="gen()"><i class="fas fa-magic"></i><span>توليد</span></button>
            <button class="btn" style="color: #c0392b" onclick="delAll()"><i class="fas fa-broom"></i><span>تفريغ</span></button>
        </div>

        <div class="status" id="stat">جاري المزامنة...</div>

        <div class="table-wrap">
            <table>
                <thead><tr><th>الاسم</th><th>المدينة</th><th>حذف</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        
        <p style="font-size: 11px; text-align: center; color: #bdc3c7; margin-top: 15px;">
            تطوير: ماجد القويعاني
        </p>
    </div>

    <script>
        const cfg = { apiKey: "AIzaSyCCU7ngPz4swM0jRDpmQ8GS9bMgp2Kh1IU", databaseURL: "https://oceanproject-a02aa-default-rtdb.firebaseio.com" };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let list = [], cursor = -1;

        db.ref('records').on('value', s => {
            const b = document.getElementById('tbody');
            b.innerHTML = ""; list = [];
            s.forEach(c => { let d = c.val(); d.k = c.key; list.push(d); });
            list.reverse().forEach(r => {
                b.innerHTML += `<tr><td>${r.n}</td><td>${r.c || '-'}</td><td><i class="fas fa-trash" style="color:#e74c3c;padding:5px" onclick="delOne('${r.k}')"></i></td></tr>`;
            });
            document.getElementById('stat').innerText = `السجلات: ${list.length}`;
        });

        function save() {
            const n = document.getElementById('n').value;
            if(!n) return alert("اكتب الاسم");
            db.ref('records/M_'+Date.now()).set({
                n, a:document.getElementById('a').value, h:document.getElementById('h').value,
                w:document.getElementById('w').value, l:document.getElementById('l').value,
                c:document.getElementById('c').value, t:document.getElementById('t').value,
                isAuto: false
            });
            clr();
        }

        function nav(dir) {
            if(!list.length) return;
            cursor = Math.min(Math.max(cursor + dir, 0), list.length - 1);
            const d = list[cursor];
            document.getElementById('n').value = d.n;
            document.getElementById('a').value = d.a;
            document.getElementById('h').value = d.h;
            document.getElementById('w').value = d.w;
            document.getElementById('l').value = d.l;
            document.getElementById('c').value = d.c;
            document.getElementById('t').value = d.t;
            document.getElementById('stat').innerText = `عرض: ${cursor+1} من ${list.length}`;
        }

        function gen() {
            if(!confirm("توليد 1000 سجل؟")) return;
            let u = {};
            for(let i=0; i<1000; i++) {
                let k = "A_" + Date.now() + "_" + i;
                u['/records/' + k] = { n: "تجربة " + (i+1), c: "تبوك", a: 20, isAuto: true };
            }
            db.ref().update(u);
        }

        function delAll() {
            if(!confirm("حذف التلقائي؟")) return;
            db.ref('records').once('value', s => {
                let u = {};
                s.forEach(c => { if(c.val().isAuto) u[c.key] = null; });
                db.ref('records').update(u);
            });
        }

        function delOne(k) { if(confirm("حذف؟")) db.ref('records/'+k).remove(); }
        function clr() { cursor = -1; document.querySelectorAll('input, textarea').forEach(i => i.value = ""); }
    </script>
</body>
</html>
