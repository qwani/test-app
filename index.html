<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المحيط السحابي - ماجد القويعاني</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #2c3e50;
            --ocean-blue: #a2d2ff;
            --wave-speed: 20s; 
        }

        body { margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; overflow-x: hidden; }
        
        /* الخلفية المتحركة */
        .ocean { height: 100%; width: 100%; position: fixed; bottom: 0; left: 0; background: linear-gradient(180deg, #ffffff 0%, #fbc2eb 50%, var(--ocean-blue) 100%); z-index: -1; }
        .wave { background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; position: absolute; bottom: -20px; width: 6400px; height: 280px; animation: wave-move var(--wave-speed) linear infinite; opacity: 0.3; }
        @keyframes wave-move { 0% { transform: translateX(0); } 100% { transform: translateX(-1600px); } }

        /* الإطار الزجاجي */
        .glass-container { background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; width: 95%; max-width: 600px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 10; margin-bottom: 50px; }

        .form-grid { display: grid; gap: 10px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: rgba(255,255,255,0.8); box-sizing: border-box; font-family: inherit; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--ocean-blue); box-shadow: 0 0 8px rgba(162, 210, 255, 0.5); }
        .multi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        /* شريط الأدوات */
        .toolbar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; margin-bottom: 20px; }
        @media (min-width: 480px) { .toolbar { grid-template-columns: repeat(5, 1fr); } }
        
        .btn { background: #fff; border: none; padding: 10px 5px; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn i { font-size: 16px; margin-bottom: 4px; }
        .btn span { font-size: 9px; font-weight: bold; }

        /* جدول السجلات */
        .table-section { margin-top: 25px; border-top: 2px solid rgba(0,0,0,0.05); padding-top: 20px; }
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 15px; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.3); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 450px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        th { background-color: var(--ocean-blue); color: white; font-weight: 600; }
        tr:hover { background-color: rgba(255,255,255,0.8); }
        .delete-btn { color: #e74c3c; cursor: pointer; border: none; background: none; font-size: 16px; transition: 0.2s; }
        .delete-btn:hover { transform: scale(1.2); }

        .copyright { margin-top: 15px; text-align: center; color: #7f8c8d; font-size: 11px; line-height: 1.6; }

        @media print {
            .ocean, .toolbar, .form-grid, h3, .copyright, .delete-btn { display: none !important; }
            .glass-container { box-shadow: none; border: none; width: 100%; max-width: none; background: white; }
            table { font-size: 14px; border: 1px solid #000; }
            th { background: #eee !important; color: #000; }
        }
    </style>
</head>
<body>

    <div class="ocean"><div class="wave"></div><div class="wave"></div></div>

    <div class="glass-container">
        <h3 style="text-align: center; margin-bottom: 15px; color: var(--text-dark);">إدارة السجلات السحابية</h3>
        
        <div class="form-grid">
            <input type="text" id="name" placeholder="الاسم الكامل">
            <div class="multi-row">
                <input type="number" id="age" placeholder="العمر">
                <input type="number" id="height" placeholder="الطول">
                <input type="number" id="weight" placeholder="الوزن">
            </div>
            <input type="text" id="family" placeholder="العائلة">
            <input type="text" id="city" placeholder="المدينة">
            <textarea id="terms" rows="2" placeholder="ملاحظات إضافية"></textarea>
        </div>

        <div class="toolbar">
            <button class="btn" style="color: #2ecc71;" onclick="saveToCloud()"><i class="fas fa-save"></i><span>حفظ</span></button>
            <button class="btn" style="color: #3498db;" onclick="loadFromCloud()"><i class="fas fa-sync"></i><span>مزامنة</span></button>
            <button class="btn" style="color: #9b59b6;" onclick="prepareNew()"><i class="fas fa-plus"></i><span>جديد</span></button>
            <button class="btn" style="color: #e67e22;" onclick="clearInputs()"><i class="fas fa-eraser"></i><span>مسح</span></button>
            <button class="btn" style="color: #2c3e50;" onclick="window.print()"><i class="fas fa-print"></i><span>طباعة</span></button>
        </div>

        <div class="copyright">
            تطوير المبرمج: <b>ماجد محمد القويعاني</b><br>
            <small>maged.qwani@gmail.com</small>
        </div>

        <div class="table-section">
            <h4 style="margin-bottom: 10px; color: var(--text-dark);"><i class="fas fa-database"></i> الأرشيف السحابي اللحظي:</h4>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>المدينة</th>
                            <th>التاريخ</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="autoTableBody">
                        <tr><td colspan="4">جاري الاتصال بالسحابة...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase المصححة
        const firebaseConfig = {
            apiKey: "AIzaSyCCU7ngPz4swM0jRDpmQ8GS9bMgp2Kh1IU",
            authDomain: "oceanproject-a02aa.firebaseapp.com",
            // تم تصحيح رابط قاعدة البيانات بإضافة -default-rtdb
            databaseURL: "https://oceanproject-a02aa-default-rtdb.firebaseio.com",
            projectId: "oceanproject-a02aa",
            storageBucket: "oceanproject-a02aa.firebasestorage.app",
            messagingSenderId: "108495702627",
            appId: "1:108495702627:web:863e986e0a3eceac620656",
            measurementId: "G-9NLZ7PG1WR"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // تحديث الجدول تلقائياً عند أي تغيير
        database.ref('records').on('value', (snapshot) => {
            const body = document.getElementById('autoTableBody');
            body.innerHTML = "";
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const row = child.val();
                    body.innerHTML += `
                        <tr>
                            <td style="font-weight:bold; color:#2c3e50;">${row.name}</td>
                            <td>${row.city || '-'}</td>
                            <td style="font-size:10px;">${row.updatedAt ? row.updatedAt.split(',')[0] : '-'}</td>
                            <td><button class="delete-btn" onclick="deleteRecord('${child.key}')"><i class="fas fa-minus-circle"></i></button></td>
                        </tr>
                    `;
                });
            } else {
                body.innerHTML = "<tr><td colspan="4">لا توجد سجلات حالياً</td></tr>";
            }
        }, (error) => {
            console.error("Firebase Error:", error);
            document.getElementById('autoTableBody').innerHTML = `<tr><td colspan="4" style="color:red;">خطأ في الصلاحيات: تأكد من إعدادات Rules</td></tr>`;
        });

        function saveToCloud() {
            const nameField = document.getElementById('name');
            const name = nameField.value.trim();
            
            if(!name) {
                alert("يرجى كتابة الاسم الكامل للحفظ");
                nameField.focus();
                return;
            }

            const data = {
                name: name,
                family: document.getElementById('family').value,
                age: document.getElementById('age').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                city: document.getElementById('city').value,
                terms: document.getElementById('terms').value,
                updatedAt: new Date().toLocaleString('ar-SA')
            };

            // الحفظ باستخدام اسم الشخص كمفتاح فريد
            database.ref('records/' + name.replace(/\s/g, '_')).set(data)
                .then(() => {
                    alert("تم الحفظ والمزامنة بنجاح!");
                })
                .catch(e => {
                    console.error("Save Error:", e);
                    alert("فشل الحفظ: تأكد من تفعيل Rules في Firebase");
                });
        }

        function loadFromCloud() {
            const name = document.getElementById('name').value.trim();
            if(!name) return alert("اكتب الاسم المراد استرجاع بياناته");
            
            database.ref('records/' + name.replace(/\s/g, '_')).once('value').then(s => {
                if(s.exists()){
                    const d = s.val();
                    document.getElementById('family').value = d.family || '';
                    document.getElementById('age').value = d.age || '';
                    document.getElementById('height').value = d.height || '';
                    document.getElementById('weight').value = d.weight || '';
                    document.getElementById('city').value = d.city || '';
                    document.getElementById('terms').value = d.terms || '';
                    alert("تمت مزامنة بيانات: " + name);
                } else {
                    alert("لا يوجد سجل بهذا الاسم في السحابة");
                }
            });
        }

        function deleteRecord(key) {
            if(confirm("سيتم حذف السجل نهائياً من السحابة، هل أنت متأكد؟")) {
                database.ref('records/' + key).remove();
            }
        }

        function clearInputs() {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function prepareNew() {
            clearInputs();
            document.getElementById('name').focus();
        }
    </script>
</body>
</html>
